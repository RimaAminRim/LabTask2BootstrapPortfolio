<div class="container mt-4 shadow p-3 mb-5 bg-body-tertiary rounded">
  <div class="card p-3">
    <h2>Contact Me</h2>
    <form>
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" placeholder="Your Name">
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Your Email">
      </div>
      <div class="mb-3">
        <label class="form-label">Message</label>
        <textarea class="form-control" rows="4" placeholder="Write your message"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
    <div class="alert alert-success mt-3">I will respond as soon as possible!</div>
  </div>
